<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Form</title>
</head>
<body>
    <h3>Job Application Form</h3>
     <form action="action.php"></form>
    <fieldset>
        <legend>Personal Information</legend> <br><br>
        <p>
        <label for="fname">1.Full Name</label>
        <input type="text" name="fname" > <br> <br>

        <label for="nid">2.National Id</label>
        <input type="number" name="nid" > <br> <br>

        <label for="email">3.Email Address</label>
        <input type="email" name="email" > <br> <br>

        <label for="number">4.Phone Number </label>
        <input type="number" name="number" > <br> <br>

        <label for="dob">5.Date od Birth</label>
        <input type="date" name="dob" > <br> <br>

        <label for="gender">6.Phone Number </label>
        <input type="text" name="gender" > <br> <br>
       </p>

    </fieldset>
    <fieldset> 
 <legend>Job Information</legend>
            
            <p>
                <label for="position">7.Position Applied For:</label>
                <select id="position" name="position" required> 
                    <option value="" disabled selected>Select your Position</option> 
                <option value="software_developer" selected>Software Developer</option>
                <option value="web_designer">Web Designer</option> 
                <option value="network_engineer">Network Engineer</option>
                <option value="database_administrator">Database Administrator</option> 
                 <option value="it_support">IT Support Officer</option>
                </select>
                <br> <br> <br>
                <label for="experience">8. Experience Level:</label>
                <select id="experience" name="experience_level" required>                     
                    <option value="" disabled selected>Select your experience</option> 
                    <option value="fresher">Fresher</option>
                    <option value="1-2_years">1-2 Years</option>
                    <option value="3-5_years">3-5 Years</option> 
                    <option value="5_plus">More Than 5 Years</option>
                </select>
            </p>
        </fieldset>
    <fieldset>
             <legend>Skills</legend>

        <p>9. Select Technical Skills:</p>

            <input type="checkbox" id="html" name="skills" value="HTML">
                    <label for="html">HTML</label><br>

            <input type="checkbox" id="css" name="skills" value="CSS">
                    <label for="css">CSS</label><br>

            <input type="checkbox" id="javascript" name="skills" value="JavaScript">
                    <label for="javascript">JavaScript</label><br>

            <input type="checkbox" id="python" name="skills" value="Python">
                    <label for="python">Python</label><br>

            <input type="checkbox" id="sql" name="skills" value="SQL">
                    <label for="sql">SQL</label><br>
    </fieldset>
    <fieldset>
            <legend>Educational Information</legend>

        <p>
            
            <label for="qualification">10. Highest Qualification:</label>
                <input type="text" id="qualification" name="qualification">
                    <br><br>

            <label for="college">11. University/College Name:</label>
                <input type="text" id="college" name="college">
                    <br><br>

            <label for="graduationYear">12. Graduation Year:</label>
                <input type="text" id="graduationYear" name="graduationYear">
                    <br><br>
        </p>
    </fieldset>
    <fieldset>
        <legend>Additional Information</legend>
        <p>
            <label for="resume">13. Upload Resume/CV:</label>
            <input type="file" id="resume" name="resume">
                     <br><br>

            <label for="coverletter">14. Upload Cover Letter:</label>
            <input type="file" id="coverletter" name="coverletter">
                  <br><br>

            <label for="address">15. Current Address:</label>
            <input type="text" id="address" name="address">
            <br><br>
        </p>
    </fieldset>
         <fieldset>
            <legend>Buttons</legend>

            <p>
                
            <input type="submit" value="16. Submit"> <br><br>
            <input type="reset" value="17. Reset">
            </p>
         </fieldset>  

</body>
</html>
